<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PixelNova</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

    <!-- Navigation -->
    <nav>
        <div class="logo">PixelNova</div>
        <ul>
            <li><a href="#hero">Home</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <header class="hero" id="hero">
        <div class="content">
            <h1>Next-Level Web Design</h1>
            <p>Custom-built digital experiences that perform and inspire.</p>
        </div>
    </header>

    <!-- Services Section -->
    <section id="services">
        <h2>Our Services</h2>
        <div class="card">
            <span class="badge">Feature</span>
            <h3>UX/UI Design</h3>
            <p>We craft user-first, responsive interfaces for brands that lead.</p>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact">
        <h2>Contact Us</h2>
        <form class="contact-form">
            <input type="text" placeholder="Your Name" />
            <input type="email" placeholder="Your Email" />
            <textarea placeholder="Your Message"></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>

</body>

</html>
